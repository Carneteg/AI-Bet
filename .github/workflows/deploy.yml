name: Build & Deploy

on:
  push:
    branches:
      - work
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '22'

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint
        continue-on-error: true

      - name: Build project
        run: npm run build
        env:
          # Optional: Set dummy values for build-time env vars if needed
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY || 'dummy-for-build' }}

      - name: Check build output
        run: |
          echo "Build directory contents:"
          ls -la .next/
          echo "Static files:"
          find .next/static -type f | head -20

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: .next/
          retention-days: 5

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/work' || github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: vercel/action@main
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # Deploy to preview for 'work' branch, production for 'main'
          production: ${{ github.ref == 'refs/heads/main' }}
        env:
          GITHUB_DEPLOYMENT_STATUS: true

  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Check homepage
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" https://ai-bet-chi.vercel.app/)
          if [ "$status" = "200" ]; then
            echo "✅ Homepage accessible"
          else
            echo "❌ Homepage returned $status"
            exit 1
          fi

      - name: Check API endpoints
        run: |
          echo "Testing /api/crawl..."
          curl -s https://ai-bet-chi.vercel.app/api/crawl | jq . > /dev/null && echo "✅ API crawl works" || echo "❌ API crawl failed"
          
          echo "Testing /api/live-matches..."
          matches=$(curl -s https://ai-bet-chi.vercel.app/api/live-matches | jq '.matches | length')
          if [ "$matches" = "13" ]; then
            echo "✅ Live matches: 13"
          else
            echo "⚠️  Live matches: $matches (expected 13)"
          fi

      - name: Verify data consistency
        run: |
          echo "Checking match data structure..."
          curl -s https://ai-bet-chi.vercel.app/api/live-matches | \
            jq '.matches[0] | {homeTeam, awayTeam, streckning, recommendation}' && \
            echo "✅ Data structure valid" || echo "❌ Data structure invalid"
